<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Suica購入シミュレーター | Suica Ticket Machine Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --suica:#0aa89e;--suica-d:#067a72;--suica-l:#3fd0c6;
    --jr:#00833e;--jr-d:#00622e;
    --metal-1:#3a3f45;--metal-2:#23272c;--metal-3:#15181c;
    --screen:#eef3f2;--ink:#1b2528;--line:#d2ddda;--gold:#f6d68a;--warn:#ff7a3d;--ic:#19c3ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
    background:radial-gradient(1000px 600px at 50% -8%, #2f3b34 0%, transparent 58%),linear-gradient(170deg,#0c1110 0%,#161d1b 48%,#0a0f0e 100%);
    color:var(--ink);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:12px;overflow-x:hidden;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.04;
    background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);background-size:50px 50px;}

  .kiosk{width:100%;max-width:412px;position:relative;z-index:1;
    background:linear-gradient(180deg,var(--metal-1),var(--metal-2) 30%,var(--metal-3));
    border-radius:26px;padding:14px 14px 18px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.07), inset 0 -2px 8px rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.06);}
  .kiosk::before{content:"";position:absolute;inset:0;border-radius:26px;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px);}
  .screw{position:absolute;width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#6a7077,#2b2f34);box-shadow:inset 0 0 2px #000;}
  .screw.tl{top:9px;left:9px}.screw.tr{top:9px;right:9px}.screw.bl{bottom:9px;left:9px}.screw.br{bottom:9px;right:9px}

  .signage{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,var(--jr),var(--jr-d));
    border-radius:12px;padding:8px 12px;margin-bottom:11px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.18);}
  .signage .pics{display:flex;gap:8px;font-size:11px;font-weight:700;align-items:center;opacity:.95}
  .signage .pics span{background:rgba(255,255,255,.16);padding:3px 8px;border-radius:6px;}
  .signage .stn{font-family:"Zen Maru Gothic";font-weight:900;font-size:13px;letter-spacing:.04em;display:flex;align-items:center;gap:7px}
  .signage .stn .ic{width:22px;height:22px;border-radius:7px;background:rgba(0,0,0,.18);display:grid;place-items:center;font-size:14px}

  .bezel{background:#05080a;border-radius:16px;padding:10px;box-shadow:inset 0 0 0 2px #000, 0 2px 6px rgba(0,0,0,.5);}
  .screen{position:relative;background:var(--screen);border-radius:9px;overflow:hidden;aspect-ratio:3/3.95;box-shadow:inset 0 0 24px rgba(0,0,0,.12);}
  .screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:40;border-radius:9px;
    background:linear-gradient(125deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,0) 22%,rgba(255,255,255,0) 78%,rgba(255,255,255,.06) 100%);}

  .sysbar{height:30px;background:linear-gradient(180deg,#1d2a27,#13201d);color:#bfe9e2;display:flex;align-items:center;justify-content:space-between;
    padding:0 10px;font-size:10.5px;font-weight:700;letter-spacing:.04em;z-index:30;position:relative;}
  .sysbar .mid{display:flex;align-items:center;gap:6px;}.sysbar .clock{font-variant-numeric:tabular-nums;}
  .globe{display:flex;align-items:center;gap:5px;background:rgba(63,208,198,.16);color:#7fe8df;border:1px solid rgba(127,232,223,.3);
    border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;}.globe:active{transform:scale(.96)}

  .stage{position:absolute;top:30px;left:0;right:0;bottom:0;}
  .panel{position:absolute;inset:0;display:none;flex-direction:column;}
  .panel.active{display:flex;animation:fade .3s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .scr-head{background:linear-gradient(180deg,var(--jr),var(--jr-d));color:#fff;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.18);position:relative;z-index:5;}
  .scr-head h2{font-family:"Zen Maru Gothic";font-weight:900;font-size:16px;display:flex;align-items:center;gap:8px;}
  .scr-head h2::before{content:"";width:5px;height:18px;background:var(--gold);border-radius:3px;}

  .body{flex:1;padding:13px;overflow-y:auto;display:flex;flex-direction:column;background:linear-gradient(180deg,#f6faf9,#e9f1ef);}
  .body::-webkit-scrollbar{width:5px}.body::-webkit-scrollbar-thumb{background:#c2cfcc;border-radius:6px}

  .guide{display:flex;align-items:center;gap:9px;background:#fffefb;border:1px solid #e7eeec;border-left:4px solid var(--suica);
    border-radius:10px;padding:8px 11px;margin-bottom:11px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .guide .peng{flex:0 0 auto}
  .guide .txt{font-size:12px;font-weight:700;color:#33484a;line-height:1.3}
  .guide .lab{font-size:8.5px;font-weight:700;color:var(--suica-d);letter-spacing:.14em;display:block;margin-bottom:1px;}

  .grid{display:grid;gap:9px;}.grid.two{grid-template-columns:1fr 1fr;}
  .opt{position:relative;border:2px solid var(--line);background:#fff;border-radius:11px;padding:13px 13px;text-align:left;cursor:pointer;
    font-family:inherit;color:var(--ink);box-shadow:0 2px 0 #d8e2df;transition:transform .1s,border-color .12s,box-shadow .1s;}
  .opt:active{transform:translateY(2px);box-shadow:0 0 0 #d8e2df;}
  .opt.primary{border-color:var(--suica);background:linear-gradient(180deg,#eafffc,#d6faf5);box-shadow:0 2px 0 #9fded7;}
  .opt .t{font-family:"Zen Maru Gothic";font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;}
  .opt .s{font-size:11px;color:#5f7470;margin-top:3px;line-height:1.35;}
  .opt .tag{position:absolute;top:-8px;right:10px;font-size:9px;font-weight:700;color:#fff;background:var(--warn);padding:2px 8px;border-radius:20px;box-shadow:0 2px 4px rgba(0,0,0,.2);}
  .opt.green-tag .tag{background:var(--suica)}.opt.blue-tag .tag{background:#4f8bb3}
  .opt.dim{opacity:.45;pointer-events:none;border-style:dashed;background:#f3f7f6;box-shadow:none}

  .note{background:#eef6f4;border:1px solid #d8e7e3;border-radius:10px;padding:9px 11px;margin-top:11px;font-size:11px;color:#4a5b5e;line-height:1.55}
  .note b{color:var(--suica-d)}

  #p-idle{align-items:center;justify-content:center;text-align:center;padding:24px;background:radial-gradient(120% 80% at 50% 0%,#d8fbf6 0%,#eef3f2 60%);position:relative;}
  #p-idle .ribbon{position:absolute;top:14px;left:0;right:0;font-size:10px;letter-spacing:.3em;color:#8fb1ab;font-weight:700;}
  .penbig{margin-bottom:6px;animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #idle-title{font-family:"Zen Maru Gothic";font-weight:900;font-size:23px;color:var(--suica-d);white-space:pre-line;line-height:1.25}
  #idle-sub{color:#5d7470;font-size:12px;margin-top:8px;line-height:1.5}
  .touch{margin-top:20px;border:none;cursor:pointer;font-family:"Zen Maru Gothic";font-weight:900;color:#fff;font-size:15px;padding:14px 28px;border-radius:40px;
    background:linear-gradient(135deg,var(--suica-l),var(--suica-d));box-shadow:0 8px 20px -6px rgba(10,168,158,.7);animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

  .langlist{display:grid;grid-template-columns:1fr 1fr;gap:9px;}.langlist .opt .t{justify-content:flex-start}

  .breakdown{background:#fff;border:1px solid #e0eae7;border-radius:11px;padding:11px 13px;margin-top:11px;font-size:12px;color:#4a5b5e;}
  .breakdown .row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
  .breakdown .row.tot{border-top:1px dashed #c2d2ce;margin-top:5px;padding-top:6px;font-weight:700;color:var(--ink)}
  .pill{display:inline-block;background:var(--suica);color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}

  .pay-top{text-align:center;margin:4px 0 8px}
  .pay-top .due{font-size:11.5px;color:#5f7470}.pay-top .due small{color:#8a9b97;font-weight:700}
  .pay-top .ins{font-family:"Zen Maru Gothic";font-weight:900;font-size:30px;color:var(--ink);line-height:1.1}
  .pay-top .ins.ok{color:var(--suica-d)}
  .meter{height:9px;background:#dde9e6;border-radius:9px;overflow:hidden;margin:9px 0 5px}
  .meter>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--suica-l),var(--suica));transition:width .35s}
  .pay-top .remain{font-size:12px;color:#5f7470}.pay-top .remain b{color:var(--ink)}

  .paymethod{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:2px 0 10px}
  .pm-btn{border:2px solid var(--line);background:#fff;border-radius:10px;padding:9px 4px;cursor:pointer;font-family:"Zen Maru Gothic";font-weight:700;
    font-size:13px;color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:2px;transition:.12s}
  .pm-btn small{font-weight:500;font-size:9px;color:#7d8e8a}
  .pm-btn.active{border-color:var(--suica);background:#e9fffb;box-shadow:0 2px 0 #9fded7}
  .pm-btn:active{transform:scale(.98)}

  .money{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:4px}
  .cash{cursor:pointer;border:none;font-family:inherit;border-radius:10px;padding:11px 4px;font-weight:700;font-size:12.5px;
    display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .1s}
  .cash:active{transform:translateY(2px) scale(.97)}.cash em{font-style:normal;font-size:15px}
  .cash.bill{background:linear-gradient(135deg,#fdf3d3,#f3df9f);color:#7a5a16;box-shadow:0 3px 0 #e3ca7d}
  .cash.coin{background:linear-gradient(135deg,#edf1f3,#cdd7db);color:#43575f;box-shadow:0 3px 0 #b3bfc4}
  .pay-hint{font-size:10.5px;color:#7d8e8a;text-align:center;margin-top:9px}
  .credit-note{background:#fff4ee;border:1px solid #ffd6bf;color:#8a4a25;line-height:1.6}
  .credit-note b{color:#c2521f}

  .field{margin-top:10px}
  .field label{font-size:11px;font-weight:700;color:#5f7470;display:block;margin-bottom:4px}
  .field input{width:100%;border:2px solid #dbe5e2;border-radius:9px;padding:11px 12px;font-family:inherit;font-size:14px;background:#fff}
  .field input:focus{outline:none;border-color:var(--suica)}

  #p-dispense{align-items:center;justify-content:center;text-align:center;background:#0c1513;color:#dff5f1}
  .spin{width:46px;height:46px;border-radius:50%;border:5px solid rgba(255,255,255,.12);border-top-color:var(--suica-l);animation:spin .8s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  #p-dispense .dt{font-family:"Zen Maru Gothic";font-weight:900;font-size:17px}#p-dispense .ds{font-size:12px;opacity:.8;margin-top:4px}

  #done-body{align-items:center;text-align:center}
  .card-pop{animation:cardpop .6s cubic-bezier(.2,1.4,.5,1) both;margin:2px auto 6px}
  @keyframes cardpop{from{transform:scale(.5) rotate(-7deg);opacity:0}to{transform:none;opacity:1}}
  .card3d{width:196px;height:122px;border-radius:13px;position:relative;overflow:hidden;text-align:left;padding:12px 14px;color:#fff;
    background:linear-gradient(135deg,var(--suica-l) 0%,var(--suica) 46%,var(--suica-d) 100%);box-shadow:0 14px 26px -8px rgba(6,122,114,.7)}
  .card3d::after{content:"";position:absolute;right:-28px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.13)}
  .card3d .peng{position:absolute;right:10px;bottom:8px;opacity:.9}
  .card3d .nm{font-family:"Zen Maru Gothic";font-weight:900;font-size:21px;letter-spacing:.04em}
  .card3d .bal{position:absolute;bottom:12px;left:14px}
  .card3d .bal small{font-size:9px;opacity:.9;display:block}.card3d .bal b{font-size:19px;font-family:"Zen Maru Gothic"}
  .done-title{font-family:"Zen Maru Gothic";font-weight:900;font-size:18px;color:var(--suica-d);margin-top:8px}
  .receipt{width:100%;background:#fff;border:2px dashed #cfdad7;border-radius:11px;padding:11px 13px;margin-top:11px;text-align:left;font-size:12px;color:#4a5b5e}
  .receipt .r{display:flex;justify-content:space-between;padding:2.5px 0}.receipt .r b{color:var(--ink)}
  .tips{width:100%;background:#fff7e6;border:1px solid #ffe6a8;border-radius:11px;padding:11px 13px;margin-top:10px;text-align:left;font-size:11px;color:#7a5d1c;line-height:1.55}.tips b{color:#5e4710}

  /* hotel affiliate CTA */
  .stay-cta{width:100%;margin-top:12px;text-align:left;background:linear-gradient(180deg,#ffffff,#f1f9f7);border:2px solid var(--suica);
    border-radius:14px;padding:13px 14px;box-shadow:0 8px 20px -10px rgba(10,168,158,.5);position:relative;}
  .stay-cta .pr{position:absolute;top:10px;right:12px;font-size:8.5px;font-weight:700;color:#9aa7a4;border:1px solid #d3ddda;border-radius:5px;padding:1px 5px;letter-spacing:.08em}
  .stay-cta h4{font-family:"Zen Maru Gothic";font-weight:900;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:7px;padding-right:34px}
  .stay-cta p{font-size:11px;color:#5f7470;margin-top:4px;line-height:1.5}
  .stay-areas{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .stay-areas a{display:inline-flex;align-items:center;gap:5px;text-decoration:none;background:#fff;border:1.5px solid var(--line);
    border-radius:30px;padding:7px 12px;font-family:"Zen Maru Gothic";font-weight:700;font-size:12px;color:var(--suica-d);transition:.12s}
  .stay-areas a:hover{border-color:var(--suica);background:#eafffc}
  .stay-areas a:active{transform:scale(.97)}
  .stay-foot{display:flex;flex-wrap:wrap;gap:10px;margin-top:11px;align-items:center}
  .stay-foot a{font-size:11px;font-weight:700;text-decoration:none;color:var(--suica-d)}
  .stay-foot a.idx{color:#4f8bb3}
  .stay-foot a:hover{text-decoration:underline}

  .actions{display:flex;gap:8px;margin-top:auto;padding-top:13px}
  .btn{flex:1;border:none;cursor:pointer;font-family:"Zen Maru Gothic";font-weight:700;font-size:13px;padding:12px;border-radius:10px;transition:transform .1s}
  .btn:active{transform:translateY(2px)}
  .btn.ghost{background:#e6efed;color:#5f7470}
  .btn.go{background:linear-gradient(135deg,var(--suica-l),var(--suica-d));color:#fff;box-shadow:0 5px 12px -4px rgba(10,168,158,.6)}
  .btn:disabled{opacity:.4;pointer-events:none}

  .progress{display:flex;gap:5px;justify-content:center;padding:9px 0 3px}
  .progress i{width:6px;height:6px;border-radius:50%;background:#454c52;transition:.3s}
  .progress i.on{background:var(--suica-l);box-shadow:0 0 6px var(--suica-l)}

  .console{margin-top:13px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .ctile{background:linear-gradient(180deg,#1b2025,#0e1216);border-radius:13px;padding:11px;border:1px solid rgba(255,255,255,.05);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 4px 10px rgba(0,0,0,.4)}
  .ctile .clbl{font-size:8.5px;color:#83b3ac;letter-spacing:.12em;font-weight:700;text-align:center;margin-top:8px}

  .ic-pad{height:62px;border-radius:11px;display:grid;place-items:center;position:relative;background:radial-gradient(circle at 50% 45%,#103a4a,#0a2129);border:2px solid rgba(25,195,255,.35)}
  .ic-ring{width:44px;height:44px;border-radius:50%;border:3px solid var(--ic);display:grid;place-items:center;color:var(--ic);font-weight:900;font-size:13px;font-family:"Zen Maru Gothic";
    box-shadow:0 0 14px rgba(25,195,255,.5),inset 0 0 10px rgba(25,195,255,.35);animation:icpulse 2.2s infinite}
  @keyframes icpulse{0%,100%{box-shadow:0 0 12px rgba(25,195,255,.45),inset 0 0 8px rgba(25,195,255,.3)}50%{box-shadow:0 0 22px rgba(25,195,255,.8),inset 0 0 14px rgba(25,195,255,.5)}}
  .call-btn{height:62px;border-radius:11px;display:grid;place-items:center;cursor:pointer;background:radial-gradient(circle at 50% 40%,#ff8a4a,#c23c10);color:#fff;
    font-family:"Zen Maru Gothic";font-weight:900;font-size:13px;border:2px solid rgba(255,255,255,.25);box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,255,255,.3)}
  .call-btn:active{transform:translateY(2px)}

  .bill-slot{height:18px;border-radius:5px;background:#000;position:relative;overflow:hidden;box-shadow:inset 0 3px 6px rgba(0,0,0,.9)}
  .bill-slot::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,transparent,var(--suica-l),transparent);opacity:0;transition:.3s}
  .coin-slot{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#2a3036,#000);margin:10px auto 0;box-shadow:inset 0 2px 5px rgba(0,0,0,.9)}
  .slots-active .bill-slot::before{opacity:1;animation:scanline 1.4s linear infinite}
  @keyframes scanline{0%{transform:translateY(0)}100%{transform:translateY(16px)}}

  /* tray + card emergence */
  .tray{grid-column:1/-1;margin-top:2px;background:linear-gradient(180deg,#0a0e10,#05080a);border-radius:13px;height:74px;position:relative;overflow:hidden;
    border:1px solid rgba(255,255,255,.04);box-shadow:inset 0 6px 14px rgba(0,0,0,.85)}
  .tray .slotline{position:absolute;top:9px;left:18%;right:18%;height:4px;border-radius:3px;background:#000;box-shadow:inset 0 1px 2px rgba(0,0,0,.9);transition:.3s}
  .tray.eject .slotline{box-shadow:inset 0 1px 2px #000,0 0 12px var(--suica-l);background:linear-gradient(90deg,#031,#063,#031)}
  .tray .tlbl{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:8.5px;color:#5d7a75;letter-spacing:.12em;font-weight:700}
  .tray .mini-card{position:absolute;left:50%;top:-46px;transform:translateX(-50%) rotate(-1deg);width:104px;height:46px;border-radius:7px;
    background:linear-gradient(135deg,var(--suica-l),var(--suica) 55%,var(--suica-d));box-shadow:0 8px 16px rgba(0,0,0,.55);
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:"Zen Maru Gothic";font-weight:900;font-size:13px;letter-spacing:.05em;opacity:0;z-index:2}
  .tray .mini-card.out{animation:eject 1.1s cubic-bezier(.25,1.05,.4,1) forwards}
  @keyframes eject{0%{top:-46px;opacity:0}25%{opacity:1}55%{top:26px}70%{top:20px}100%{top:24px;opacity:1}}
  .tray .mini-card.out::after{content:"";position:absolute;inset:-3px;border-radius:9px;box-shadow:0 0 0 0 rgba(63,208,198,.6);animation:glow 1.4s ease-out .6s 2}
  @keyframes glow{0%{box-shadow:0 0 0 0 rgba(63,208,198,.55)}100%{box-shadow:0 0 0 14px rgba(63,208,198,0)}}

  .credit{text-align:center;color:#5d7470;font-size:9.5px;margin-top:13px;letter-spacing:.04em}.credit b{color:#7fe8df}

  .overlay{position:absolute;inset:0;z-index:60;background:rgba(8,14,13,.78);display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}
  .overlay.show{display:flex;animation:fade .25s ease both}
  .ov-card{background:#fff;border-radius:16px;padding:16px;width:100%;max-width:300px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .ov-card h3{font-family:"Zen Maru Gothic";font-weight:900;font-size:15px;margin-bottom:11px;color:var(--ink);text-align:center}
  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ov-grid button{border:2px solid var(--line);background:#fff;border-radius:10px;padding:10px 6px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);transition:.12s}
  .ov-grid button.sel{border-color:var(--suica);background:#e9fffb}.ov-grid button:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="kiosk">
  <span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>
  <div class="signage">
    <div class="stn"><span class="ic">🐧</span><span>Fuji&nbsp;Station</span></div>
    <div class="pics"><span>きっぷ</span><span>Suica</span><span>IC</span></div>
  </div>

  <div class="bezel"><div class="screen">
    <div class="sysbar">
      <span>No.7&nbsp;·&nbsp;<span data-t="m_label"></span></span>
      <span class="mid"><span class="clock" id="clock">--:--</span>
        <span class="globe" id="globe">🌐 <span id="globe-label">日本語</span></span></span>
    </div>

    <div class="stage">
      <!-- IDLE -->
      <div class="panel active" id="p-idle">
        <div class="ribbon">JR EAST · 東日本旅客鉄道</div>
        <div class="penbig" id="penbig"></div>
        <div id="idle-title"></div><div id="idle-sub"></div>
        <button class="touch" id="touch-btn" data-go="p-language"></button>
      </div>

      <!-- LANGUAGE -->
      <div class="panel" id="p-language">
        <div class="scr-head"><h2 data-t="lang_title"></h2></div>
        <div class="body"><div class="langlist" id="langlist"></div></div>
      </div>

      <!-- MENU -->
      <div class="panel" id="p-menu">
        <div class="scr-head"><h2 data-t="menu_title"></h2></div>
        <div class="body">
          <div class="guide"><span class="peng pg"></span><span class="txt"><span class="lab" data-t="help_label"></span><span data-t="c_menu"></span></span></div>
          <div class="grid two">
            <button class="opt primary" data-go="route-suica"><div class="t">💳 <span data-t="menu_suica"></span></div></button>
            <button class="opt dim"><div class="t">🎫 <span data-t="menu_tickets"></span></div></button>
            <button class="opt dim"><div class="t">💴 <span data-t="menu_charge"></span></div></button>
            <button class="opt dim"><div class="t">📅 <span data-t="menu_pass"></span></div></button>
          </div>
          <div class="actions"><button class="btn ghost" data-go="p-language">← <span data-t="back"></span></button></div>
        </div>
      </div>

      <!-- CARD TYPE -->
      <div class="panel" id="p-cardtype">
        <div class="scr-head"><h2 data-t="ct_title"></h2></div>
        <div class="body">
          <div class="guide"><span class="peng pg"></span><span class="txt"><span class="lab" data-t="help_label"></span><span data-t="c_cardtype"></span></span></div>
          <div class="grid">
            <button class="opt green-tag" data-card="unreg"><span class="tag" data-t="ct_unreg_tag"></span>
              <div class="t">🐧 <span data-t="ct_unreg_t"></span></div><div class="s" data-t="ct_unreg_s"></div></button>
            <button class="opt blue-tag" data-card="reg"><span class="tag" data-t="ct_reg_tag"></span>
              <div class="t">📝 <span data-t="ct_reg_t"></span></div><div class="s" data-t="ct_reg_s"></div></button>
          </div>
          <div class="note" data-t="ct_deposit"></div>
          <div class="actions"><button class="btn ghost" data-go="p-menu">← <span data-t="back"></span></button></div>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="panel" id="p-register">
        <div class="scr-head"><h2 data-t="reg_title"></h2></div>
        <div class="body">
          <div class="guide"><span class="peng pg"></span><span class="txt"><span class="lab" data-t="help_label"></span><span data-t="c_register"></span></span></div>
          <div class="field"><label data-t="reg_name"></label><input id="f-name" autocomplete="off" placeholder="TARO TABI"></div>
          <div class="field"><label data-t="reg_phone"></label><input id="f-phone" inputmode="numeric" autocomplete="off" placeholder="090-0000-0000"></div>
          <div class="note" data-t="reg_note"></div>
          <div class="actions">
            <button class="btn ghost" data-go="p-cardtype">← <span data-t="back"></span></button>
            <button class="btn go" id="reg-next"><span data-t="next"></span> →</button>
          </div>
        </div>
      </div>

      <!-- AMOUNT -->
      <div class="panel" id="p-amount">
        <div class="scr-head"><h2 data-t="amt_title"></h2></div>
        <div class="body">
          <div class="guide"><span class="peng pg"></span><span class="txt"><span class="lab" data-t="help_label"></span><span data-t="c_amount"></span></span></div>
          <div class="grid two" id="amount-grid"></div>
          <div class="breakdown" id="amount-info" style="display:none"></div>
          <div class="actions"><button class="btn ghost" id="amt-back">← <span data-t="back"></span></button></div>
        </div>
      </div>

      <!-- PAYMENT -->
      <div class="panel" id="p-payment">
        <div class="scr-head"><h2 data-t="c_payment"></h2></div>
        <div class="body">
          <div class="pay-top">
            <div class="due"><span data-t="pay_due"></span>: <b id="due-amt"></b> <small id="dep-incl"></small></div>
          </div>
          <div class="paymethod">
            <button class="pm-btn active" data-method="cash">💴 <span data-t="pm_cash"></span></button>
            <button class="pm-btn" data-method="credit">💳 <span data-t="pm_credit"></span><small data-t="pm_credit_sub"></small></button>
          </div>

          <div id="cash-area">
            <div class="pay-top">
              <div class="ins" id="inserted">¥0</div>
              <div class="meter"><i id="meter-bar"></i></div>
              <div class="remain" id="remain"></div>
            </div>
            <div class="money">
              <button class="cash bill" data-cash="10000"><em>💴</em>¥10,000</button>
              <button class="cash bill" data-cash="5000"><em>💴</em>¥5,000</button>
              <button class="cash bill" data-cash="1000"><em>💴</em>¥1,000</button>
              <button class="cash coin" data-cash="500"><em>🪙</em>¥500</button>
              <button class="cash coin" data-cash="100"><em>🪙</em>¥100</button>
              <button class="cash coin" data-cash="50"><em>🪙</em>¥50</button>
            </div>
            <div class="pay-hint" data-t="pay_hint"></div>
          </div>

          <div id="credit-area" style="display:none">
            <div class="note credit-note" data-t="pm_credit_note"></div>
          </div>

          <div class="actions">
            <button class="btn ghost" id="pay-cancel"><span data-t="cancel"></span></button>
            <button class="btn go" id="pay-confirm" disabled><span data-t="confirm"></span></button>
          </div>
        </div>
      </div>

      <!-- DISPENSE -->
      <div class="panel" id="p-dispense">
        <div class="spin"></div><div class="dt" data-t="disp_t"></div><div class="ds" data-t="disp_s"></div>
      </div>

      <!-- DONE -->
      <div class="panel" id="p-done">
        <div class="scr-head"><h2 data-t="done_title"></h2></div>
        <div class="body" id="done-body">
          <div class="guide" style="margin-bottom:8px"><span class="peng pg"></span><span class="txt"><span class="lab" data-t="help_label"></span><span data-t="c_done"></span></span></div>
          <div class="card-pop"><div class="card3d">
            <div class="nm" id="card-name">Suica</div>
            <div class="bal"><small id="card-sub"></small><b id="card-bal">¥0</b></div>
            <span class="peng pgsmall"></span>
          </div></div>
          <div class="done-title">🎉 <span data-t="done_title"></span></div>
          <div class="stay-cta" id="stay-cta"></div>
          <div class="receipt" id="receipt"></div>
          <div class="tips" data-thtml="tips"></div>
          <div class="actions"><button class="btn go" data-go="p-idle"><span data-t="playagain"></span></button></div>
        </div>
      </div>
    </div><!-- /stage -->

    <div class="overlay" id="overlay"><div class="ov-card">
      <h3 data-t="lang_title"></h3><div class="ov-grid" id="ov-grid"></div>
    </div></div>
  </div></div><!-- /screen /bezel -->

  <div class="progress" id="progress"></div>

  <div class="console" id="console">
    <div class="ctile"><div class="ic-pad"><div class="ic-ring">IC</div></div><div class="clbl" data-t="hw_ic"></div></div>
    <div class="ctile"><button class="call-btn" id="call-btn" data-t="hw_call"></button><div class="clbl">SOS</div></div>
    <div class="ctile"><div class="bill-slot"></div><div class="coin-slot"></div><div class="clbl" data-t="hw_cash"></div></div>
    <div class="ctile"><div class="tray" id="tray"><div class="slotline"></div><div class="mini-card" id="mini-card">Suica</div><div class="tlbl" data-t="hw_card"></div></div></div>
  </div>

  <div class="credit">Powered by <b>fujiseat.com</b> · Suica Simulator</div>
</div>

  /* ============================================================
     HOTEL AFFILIATE — wired to fujiseat.com.
     - Trip.com uses per-area short-links from data/hotel-links.json
       (the same district deep-links used across the rest of the
       site). When an area has no short-link configured we fall
       back to Agoda Tokyo (city=5085, cid=1963497).
     - Agoda uses the standard partnersearch.aspx pattern with the
       site's partner cid 1963497 and Tokyo city id 5085.
     - stayIndexUrl points at the real Stay Area Index route.
     ============================================================ */
  var AFFILIATE={
    agodaCid:'1963497',                  // fujiseat.com Agoda partner cid
    agodaTokyoCity:'5085',               // Agoda city id for Tokyo
    tripAllianceId:'',                   // not used: trip uses short-links
    tripSid:'',                          // not used: trip uses short-links
    stayIndexUrl:'/areas-to-stay/tokyo-stay-area-index',
    primary:'trip'                       // matches site default (trip first)
  };
  // Well-connected Tokyo areas. tripShortUrl = per-district short-link
  // sourced from data/hotel-links.json; empty string means fall back to Agoda.
  var STAY_AREAS=[
    {label:'Tokyo Station', q:'Tokyo Station',  tripShortUrl:'https://www.trip.com/t/PgV216VBXU2'},
    {label:'Shinjuku',      q:'Shinjuku Tokyo', tripShortUrl:'https://www.trip.com/t/48qXpVIBXU2'},
    {label:'Shibuya',       q:'Shibuya Tokyo',  tripShortUrl:'https://www.trip.com/t/PEM7YWXBXU2'},
    {label:'Ueno / Asakusa',q:'Ueno Tokyo',     tripShortUrl:'https://www.trip.com/t/B0JQEdOBXU2'},
    {label:'Ginza',         q:'Ginza Tokyo',    tripShortUrl:''}
  ];
  // Build a hotel URL for an area, reusing the site's existing scheme.
  function hotelUrl(area, provider){
    var q=encodeURIComponent(area.q);
    if(provider==='trip' && area.tripShortUrl){
      return area.tripShortUrl;
    }
    // Agoda partnersearch with Tokyo city id + keyword text.
    return 'https://www.agoda.com/partners/partnersearch.aspx?pcs=1'+
      '&cid='+AFFILIATE.agodaCid+
      '&hl=en-us&city='+AFFILIATE.agodaTokyoCity+
      '&text='+q;
  }

    // fujiseat.com locale routing: defaultLocale 'en' has no prefix,
    // every other supported locale is prefixed with /<lang>. The 'ja'
    // game language is not a site locale, so we fall back to the
    // English (no-prefix) index URL for it.
    var base=AFFILIATE.stayIndexUrl;
    return (lang==='en'||lang==='ja')? base : ('/'+lang+base);
  }
  function buildStayCTA(){
    var el=document.getElementById('stay-cta'); if(!el)return;
    var chips=STAY_AREAS.map(function(a){
      return '<a href="'+hotelUrl(a,AFFILIATE.primary)+'" target="_blank" rel="sponsored noopener">🏨 '+a.label+'</a>';
    }).join('');
    el.innerHTML=
      '<span class="pr">'+st('pr')+'</span>'+
      '<h4>🛏️ '+st('title')+'</h4>'+
      '<p>'+st('sub')+'</p>'+
      '<div class="stay-areas">'+chips+'</div>'+
      '<div class="stay-foot">'+
        '<a class="idx" href="'+indexUrl()+'" target="_top">📊 '+st('index')+' →</a>'+
        '<a href="'+hotelUrl(STAY_AREAS[0],'trip')+'" target="_blank" rel="sponsored noopener">'+st('compare')+' →</a>'+
      '</div>';
  }

  function applyLang(){
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-t]').forEach(function(el){el.textContent=t(el.getAttribute('data-t'));});
    document.querySelectorAll('[data-thtml]').forEach(function(el){el.innerHTML=t(el.getAttribute('data-thtml'));});
    document.getElementById('idle-title').textContent=t('idle_title');
    document.getElementById('idle-sub').textContent=t('idle_sub');
    document.getElementById('touch-btn').textContent=t('idle_btn');
    var gl=LANGS.filter(function(l){return l.code===lang;})[0];
    document.getElementById('globe-label').textContent=gl?gl.name:'';
    refreshDynamic();
  }

  var STEPS=['p-language','p-menu','p-cardtype','p-amount','p-payment','p-done'];
  function show(id){
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
    var el=document.getElementById(id);if(el)el.classList.add('active');
    var body=el&&el.querySelector('.body');if(body)body.scrollTop=0;
    document.getElementById('console').classList.toggle('slots-active', id==='p-payment'&&state.method==='cash');
    updateProgress(id);
  }
  var prog=document.getElementById('progress');
  STEPS.forEach(function(){var i=document.createElement('i');prog.appendChild(i);});
  function updateProgress(id){
    var idx=STEPS.indexOf(id);if(id==='p-register')idx=STEPS.indexOf('p-cardtype');
    prog.querySelectorAll('i').forEach(function(d,k){d.classList.toggle('on',idx>=0&&k<=idx);});
    prog.style.visibility=(id==='p-idle'||id==='p-dispense')?'hidden':'visible';
  }

  document.body.addEventListener('click',function(e){
    var t2=e.target.closest('[data-go]');if(!t2)return;
    var go=t2.getAttribute('data-go');
    if(go==='route-suica'){show('p-cardtype');return;}
    if(go==='p-idle'){resetAll();}
    show(go);
  });

  /* language overlay */
  var overlay=document.getElementById('overlay'), ovGrid=document.getElementById('ov-grid');
  LANGS.forEach(function(l){
    var b=document.createElement('button');b.innerHTML=l.flag+' '+l.name;b.setAttribute('data-lang',l.code);
    b.addEventListener('click',function(){setLang(l.code);overlay.classList.remove('show');});
    ovGrid.appendChild(b);
  });
  function markSel(){ovGrid.querySelectorAll('button').forEach(function(b){b.classList.toggle('sel',b.getAttribute('data-lang')===lang);});}
  document.getElementById('globe').addEventListener('click',function(){markSel();overlay.classList.add('show');});
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('show');});
  function setLang(code){lang=code;applyLang();}

  var langlist=document.getElementById('langlist');
  LANGS.forEach(function(l){
    var b=document.createElement('button');b.className='opt';
    b.innerHTML='<div class="t">'+l.flag+' '+l.name+'</div><div class="s">'+l.sub+'</div>';
    b.addEventListener('click',function(){setLang(l.code);show('p-menu');});
    langlist.appendChild(b);
  });

  /* state & flow */
  var DEPOSIT=500, AMOUNTS=[1000,2000,3000,5000,10000];
  var state={card:null,amount:0,inserted:0,method:'cash'};

  document.querySelectorAll('[data-card]').forEach(function(b){
    b.addEventListener('click',function(){
      state.card=this.getAttribute('data-card');
      if(state.card==='reg'){show('p-register');}else{buildAmounts();show('p-amount');}
    });
  });
  document.getElementById('reg-next').addEventListener('click',function(){buildAmounts();show('p-amount');});
  document.getElementById('amt-back').addEventListener('click',function(){show(state.card==='reg'?'p-register':'p-cardtype');});

  function buildAmounts(){
    var g=document.getElementById('amount-grid');g.innerHTML='';
    AMOUNTS.forEach(function(a){
      var btn=document.createElement('button');btn.className='opt';
      btn.innerHTML='<div class="t">'+yen(a)+'</div><div class="s">'+t('amt_balance')+': <b>'+yen(a-DEPOSIT)+'</b></div>';
      btn.addEventListener('click',function(){selectAmount(a);});
      g.appendChild(btn);
    });
    document.getElementById('amount-info').style.display='none';
  }
  function amtBreakdownHTML(a){
    return '<div class="row"><span>'+t('amt_balance')+'</span><b>'+yen(a-DEPOSIT)+'</b></div>'+
      '<div class="row"><span>'+t('amt_deposit')+'<span class="pill">'+t('amt_refund')+'</span></span><b>'+yen(DEPOSIT)+'</b></div>'+
      '<div class="row tot"><span>'+t('amt_youpay')+'</span><b>'+yen(a)+'</b></div>';
  }
  function selectAmount(a){
    state.amount=a;
    var info=document.getElementById('amount-info');info.style.display='block';info.innerHTML=amtBreakdownHTML(a);
    setTimeout(startPayment,260);
  }

  /* payment method */
  function setMethod(m){
    state.method=m;
    document.querySelectorAll('.pm-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-method')===m);});
    document.getElementById('cash-area').style.display=(m==='cash')?'block':'none';
    document.getElementById('credit-area').style.display=(m==='credit')?'block':'none';
    document.getElementById('console').classList.toggle('slots-active', m==='cash');
    if(m==='credit'){state.inserted=state.amount;document.getElementById('pay-confirm').disabled=false;}
    else{renderPay();}
  }
  document.querySelectorAll('.pm-btn').forEach(function(b){b.addEventListener('click',function(){setMethod(this.getAttribute('data-method'));});});

  function startPayment(){
    state.inserted=0;document.getElementById('due-amt').textContent=yen(state.amount);
    document.getElementById('dep-incl').textContent='('+t('dep_incl')+')';
    setMethod('cash');renderPay();show('p-payment');
  }
  function renderPay(){
    document.getElementById('inserted').textContent=yen(state.inserted);
    var enough=state.inserted>=state.amount;
    document.getElementById('inserted').classList.toggle('ok',enough);
    document.getElementById('meter-bar').style.width=Math.min(100,state.inserted/state.amount*100)+'%';
    var rem=document.getElementById('remain');
    if(enough){var ch=state.inserted-state.amount;rem.innerHTML=ch>0?t('pay_change').replace('{n}',ch.toLocaleString('en-US')):'✅ '+t('pay_exact');}
    else{rem.innerHTML=t('pay_more').replace('{n}',(state.amount-state.inserted).toLocaleString('en-US'));}
    document.getElementById('pay-confirm').disabled=!enough;
  }
  document.querySelectorAll('[data-cash]').forEach(function(b){b.addEventListener('click',function(){if(state.method!=='cash')return;state.inserted+=parseInt(this.getAttribute('data-cash'),10);renderPay();});});
  document.getElementById('pay-cancel').addEventListener('click',function(){state.inserted=0;buildAmounts();show('p-amount');});
  document.getElementById('pay-confirm').addEventListener('click',function(){show('p-dispense');setTimeout(finish,1700);});

  function receiptHTML(){
    var usable=state.amount-DEPOSIT, change=(state.method==='credit')?0:(state.inserted-state.amount), reg=(state.card==='reg');
    var h='<div class="r"><span>'+t('r_type')+'</span><b>'+(reg?t('v_reg'):t('v_unreg'))+'</b></div>'+
      '<div class="r"><span>'+t('r_balance')+'</span><b>'+yen(usable)+'</b></div>'+
      '<div class="r"><span>'+t('r_deposit')+'</span><b>'+yen(DEPOSIT)+'</b></div>'+
      '<div class="r"><span>'+t('r_method')+'</span><b>'+(state.method==='credit'?t('v_credit'):t('v_cash'))+'</b></div>';
    if(state.method==='cash'){
      h+='<div class="r"><span>'+t('r_inserted')+'</span><b>'+yen(state.inserted)+'</b></div>'+
         '<div class="r"><span>'+t('r_change')+'</span><b>'+yen(change>0?change:0)+'</b></div>';
    }
    return h;
  }
  function finish(){
    var usable=state.amount-DEPOSIT, reg=(state.card==='reg');
    var name=(document.getElementById('f-name').value||'').trim().toUpperCase();
    document.getElementById('card-name').textContent=reg?(name?name.split(' ')[0]||'My Suica':'My Suica'):'Suica';
    document.getElementById('card-sub').textContent=reg?t('done_reg'):t('done_unreg');
    document.getElementById('card-bal').textContent=yen(usable);
    document.getElementById('receipt').innerHTML=receiptHTML();
    // physical card ejection
    var tray=document.getElementById('tray'), mc=document.getElementById('mini-card');
    mc.textContent=reg?(name?name.split(' ')[0]||'Suica':'My Suica'):'Suica';
    tray.classList.add('eject');mc.classList.remove('out');void mc.offsetWidth;mc.classList.add('out');
    setTimeout(function(){tray.classList.remove('eject');},2600);
    buildStayCTA();
    show('p-done');
  }

  function refreshDynamic(){
    var active=document.querySelector('.panel.active');var id=active?active.id:'';
    if(id==='p-amount'){buildAmounts();if(state.amount){var info=document.getElementById('amount-info');info.style.display='block';info.innerHTML=amtBreakdownHTML(state.amount);}}
    if(id==='p-payment'){document.getElementById('due-amt').textContent=yen(state.amount);document.getElementById('dep-incl').textContent='('+t('dep_incl')+')';renderPay();}
    if(id==='p-done'&&state.amount){document.getElementById('card-sub').textContent=(state.card==='reg')?t('done_reg'):t('done_unreg');document.getElementById('receipt').innerHTML=receiptHTML();buildStayCTA();}
  }

  function resetAll(){
    state={card:null,amount:0,inserted:0,method:'cash'};
    var n=document.getElementById('f-name'),p=document.getElementById('f-phone');if(n)n.value='';if(p)p.value='';
    var mc=document.getElementById('mini-card');mc.classList.remove('out');
  }

  /* call button */
  var CALL={ja:'係員を呼び出しています…（デモ）',en:'Calling a staff member… (demo)',"zh-CN":'正在呼叫工作人员…（演示）',"zh-TW":'正在呼叫服務人員…（示範）',ko:'담당자를 호출하고 있습니다… (데모)',de:'Ein Mitarbeiter wird gerufen… (Demo)',fr:'Appel d\u2019un agent… (démo)',es:'Llamando a un agente… (demo)',ru:'Вызываем сотрудника… (демо)'};
  document.getElementById('call-btn').addEventListener('click',function(){
    this.animate([{transform:'scale(1)'},{transform:'scale(.92)'},{transform:'scale(1)'}],{duration:240});
    var clk=document.getElementById('clock');var prev=clk.textContent;clk.textContent='📞';
    var tip=document.createElement('div');tip.textContent=CALL[lang]||CALL.en;
    tip.style.cssText='position:absolute;left:50%;top:34px;transform:translateX(-50%);z-index:55;background:#c23c10;color:#fff;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,.4);white-space:nowrap;max-width:90%;text-align:center;';
    document.querySelector('.screen').appendChild(tip);
    setTimeout(function(){tip.remove();clk.textContent=prev;},1900);
  });

  function tick(){var d=new Date();document.getElementById('clock').textContent=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
  tick();setInterval(tick,15000);

  // sync language with parent site via ?lang= (e.g. iframe src="...?lang=fr")
  try{
    var qp=new URLSearchParams(location.search).get('lang');
    if(qp){ var hit=LANGS.filter(function(l){return l.code===qp || l.code.toLowerCase()===qp.toLowerCase();})[0]; if(hit) lang=hit.code; }
  }catch(e){}

  applyLang();updateProgress('p-idle');
})();
</script>
</body>
</html>
